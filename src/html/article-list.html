<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>趣文阅读</title>
    <link rel="stylesheet" href="../style.css">

</head>
<body>
    <div class="article-list-page active" id="articleListPage">
        <div class="page-header">
            <button class="back-btn" onclick="backToHome()">‹</button>
            <div class="page-title">趣文阅读</div>
            <div class="right-placeholder"></div>
        </div>
        
        <div style="text-align: center; margin-bottom: 30px;">
            <div style="font-size: 16px; color: #666;" id="currentBookDisplay"></div>
        </div>
        
        <div class="article-list" id="articleList">
            <!-- 文章列表将通过JavaScript动态生成 -->
        </div>
    </div>
    
    <!-- Loading 元素 -->
    <div class="loading-overlay hidden" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">加载中，请稍候...</div>
    </div>
    
    <!-- 引入PDF.js库 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script>
        // 备用 CDN 加载
        if (typeof pdfjsLib === 'undefined') {
            document.write('<script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.4.120/build/pdf.min.js"><\/script>');
        }
    </script>
    
    <!-- 现代浏览器使用ES6模块 -->
    <script type="module" src="../js/main.js"></script>
    
    <!-- 旧浏览器使用转译后的ES5代码 -->
    <script nomodule src="../dist/js/main.js"></script>
    <script type="module">
        // 初始化文章列表页面
        document.addEventListener('DOMContentLoaded', async function() {
            console.log('[文章列表页面初始化] 开始');
            
            // 确保全局变量已初始化
            if (typeof currentFile === 'undefined' || typeof currentBookName === 'undefined') {
                console.log('[文章列表页面初始化] 等待全局变量初始化...');
                // 等待全局变量初始化
                await new Promise(resolve => {
                    const checkVariables = setInterval(() => {
                        if (typeof currentFile !== 'undefined' && typeof currentBookName !== 'undefined') {
                            clearInterval(checkVariables);
                            resolve();
                        }
                    }, 100);
                });
            }
            
            console.log('[文章列表页面初始化] 全局变量已初始化:', { currentFile, currentBookName });
            
            // 更新页面标题
            updatePageTitle();
            
            // 更新课本显示
            updateBookDisplay();
            
            // 加载文章数据
            await loadArticles();
            
            console.log('[文章列表页面初始化] 结束');
        });
        
        // 更新页面标题
        function updatePageTitle() {
            // 获取URL参数中的文件路径
            const urlParams = new URLSearchParams(window.location.search);
            const targetFile = urlParams.get('file');
            
            // 根据文件类型设置页面标题
            const pageTitle = document.querySelector('.page-title');
            const documentTitle = document.querySelector('title');
            
            if (targetFile === 'all-小学.md' || targetFile === 'all-初中.md') {
                // 必背范文
                if (pageTitle) {
                    pageTitle.textContent = '必背范文';
                }
                if (documentTitle) {
                    documentTitle.textContent = '必背范文';
                }
            } else {
                // 趣文阅读
                if (pageTitle) {
                    pageTitle.textContent = '趣文阅读';
                }
                if (documentTitle) {
                    documentTitle.textContent = '趣文阅读';
                }
            }
        }
        
        // 加载文章数据
        async function loadArticles() {
            console.log('[加载文章数据] 开始');
            // 显示加载中
            const loadingOverlay = document.getElementById('loadingOverlay');
            if (loadingOverlay) {
                loadingOverlay.classList.remove('hidden');
            }
            
            try {
                // 获取URL参数中的文件路径
                const urlParams = new URLSearchParams(window.location.search);
                const targetFile = urlParams.get('file');
                
                let mdPath = '';
                
                if (targetFile) {
                    // 如果URL参数中指定了文件，直接加载该文件
                    mdPath = `../../data/${targetFile}`;
                    console.log('[加载文章数据] 从URL参数加载文件:', mdPath);
                } else {
                    // 否则按照原来的逻辑加载当前课本对应的短文文件
                    // 检查currentFile是否存在
                    if (!window.currentFile) {
                        throw new Error('当前课本未设置');
                    }
                    
                    // 首先尝试加载当前课本对应的短文文件
                    mdPath = `../../data/${window.currentFile.replace('.pdf', '短文.md')}`;
                    console.log('[加载文章数据] 尝试加载短文文件路径:', mdPath);
                    console.log('[加载文章数据] 当前currentFile:', window.currentFile);
                    console.log('[加载文章数据] 当前currentBookName:', window.currentBookName);
                }
                
                // 尝试加载MD文件
                let response = await fetch(mdPath);
                console.log('[加载文章数据] MD文件响应状态:', response.status);
                
                if (response.ok) {
                    const content = await response.text();
                    console.log('[加载文章数据] MD文件加载成功，内容长度:', content.length);
                    parseArticles(content);
                } else {
                    console.log('[加载文章数据] 文件不存在，尝试加载3下的短文文件');
                    // 如果指定的文件不存在，加载3下的短文文件
                    mdPath = `../../data/3下短文.md`;
                    console.log('[加载文章数据] 加载3下短文文件路径:', mdPath);
                    
                    response = await fetch(mdPath);
                    console.log('[加载文章数据] 3下短文文件响应状态:', response.status);
                    
                    if (response.ok) {
                        const content = await response.text();
                        console.log('[加载文章数据] 3下短文文件加载成功，内容长度:', content.length);
                        parseArticles(content);
                    } else {
                        throw new Error('3下短文文件也不存在或无法加载');
                    }
                }
            } catch (error) {
                console.error('加载文章失败:', error);
                // 显示错误信息
                document.getElementById('articleList').innerHTML = `<div style="text-align: center; padding: 40px; color: #666;">${error.message || '暂无可用的短文'}</div>`;
            } finally {
                // 隐藏加载中
                const loadingOverlay = document.getElementById('loadingOverlay');
                if (loadingOverlay) {
                    loadingOverlay.classList.add('hidden');
                }
                console.log('[加载文章数据] 结束');
            }
        }
        
        // 解析文章数据
        function parseArticles(content) {
            const articles = [];
            const lines = content.split('\n');
            let currentArticle = null;
            
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                
                if (line.startsWith('## ')) {
                    // 新文章开始
                    if (currentArticle) {
                        articles.push(currentArticle);
                    }
                    
                    const chineseTitle = line.substring(3).trim();
                    currentArticle = {
                        chineseTitle: chineseTitle,
                        title: '',
                        body: '',
                        translation: '',
                        grammar: ''
                    };
                } else if (currentArticle) {
                    if (line.startsWith('**Title: ')) {
                        currentArticle.title = line.substring(9, line.length - 2).trim();
                    } else if (line === '**Body:**') {
                        // 收集正文内容
                        let bodyContent = '';
                        i++;
                        while (i < lines.length && !lines[i].trim().startsWith('**')) {
                            bodyContent += lines[i] + ' ';
                            i++;
                        }
                        i--; // 回退一行，因为循环会自增
                        currentArticle.body = bodyContent.trim();
                    } else if (line === '**中文大意:**') {
                        // 收集中文大意
                        let translationContent = '';
                        i++;
                        while (i < lines.length && !lines[i].trim().startsWith('**')) {
                            translationContent += lines[i] + ' ';
                            i++;
                        }
                        i--; // 回退一行，因为循环会自增
                        currentArticle.translation = translationContent.trim();
                    } else if (line === '**语法点:**') {
                        // 收集语法点
                        let grammarContent = '';
                        i++;
                        while (i < lines.length && !lines[i].trim().startsWith('## ')) {
                            if (lines[i].trim()) {
                                grammarContent += lines[i].trim() + ' ';
                            }
                            i++;
                        }
                        i--; // 回退一行，因为循环会自增
                        currentArticle.grammar = grammarContent.trim();
                    }
                }
            }
            
            // 添加最后一篇文章
            if (currentArticle) {
                articles.push(currentArticle);
            }
            
            console.log('[解析文章数据] 解析完成，文章数量:', articles.length);
            renderArticleList(articles);
        }
        
        // 渲染文章列表
        function renderArticleList(articles) {
            const listContainer = document.getElementById('articleList');
            
            if (articles.length === 0) {
                listContainer.innerHTML = '<div style="text-align: center; padding: 40px; color: #666;">暂无可用的短文</div>';
                return;
            }
            
            listContainer.innerHTML = articles.map((article, index) => {
                // 生成预览文本（截取正文前100个字符）
                const preview = article.body.length > 100 ? article.body.substring(0, 100) + '...' : article.body;
                
                return `
                <div class="article-item" onclick="openArticleDetailPage(${index})"><div class="article-title">${article.title}</div>
                    <div class="article-chinese-title">${article.chineseTitle}</div>
                    <div class="article-preview">${preview}</div>
                </div>
                `;
            }).join('');
        }
        
        // 打开文章详情页面
        function openArticleDetailPage(index) {
            // 获取当前URL参数中的file参数
            const urlParams = new URLSearchParams(window.location.search);
            const targetFile = urlParams.get('file');
            
            // 构建新的URL，包含index和file参数
            let url = `article-detail.html?index=${index}`;
            if (targetFile) {
                url += `&file=${encodeURIComponent(targetFile)}`;
            }
            
            window.location.href = url;
        }
        
        // 暴露函数到全局作用域
        window.openArticleDetailPage = openArticleDetailPage;
        
        // 更新课本显示
        function updateBookDisplay() {
            // 检查是否为7年级及以上教材
            const isPeopleEdition = window.currentFile && parseInt(window.currentFile[0]) >= 7;
            const bookPrefix = isPeopleEdition ? '人教版' : '外研版Join In';
            
            // 更新当前课本显示
            const currentBookDisplay = document.getElementById('currentBookDisplay');
            if (currentBookDisplay) {
                currentBookDisplay.textContent = `${bookPrefix}-${window.currentBookName}`;
            }
        }
    </script>
</body>
</html>
