<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>文章阅读</title>
    <link rel="stylesheet" href="../style.css">

</head>
<body>
    <div class="article-detail-page active" id="articleDetailPage">
        <div class="page-header">
            <button class="back-btn" onclick="backToArticleList()">‹</button>
            <div class="page-title">文章详情</div>
            <div class="right-placeholder"></div>
        </div>
        
        <div class="article-container">
            <h1 class="article-title" id="articleTitle"></h1>
            <div class="article-chinese-title" id="articleChineseTitle"></div>
            
            <div class="article-section">
                <h2 class="section-title" style="display: flex; justify-content: space-between; align-items: center;">
                    英文原文
                    <div id="parentStampContainer">
                        <button class="stamp-btn" onclick="showParentStampModal()">家长盖章</button>
                    </div>
                </h2>
                <div class="article-body" id="articleBody">
                    <!-- 英文原文将通过JavaScript动态生成 -->
                </div>
            </div>
            
            <div class="article-section">
                <h2 class="section-title collapsible-title" onclick="toggleCollapse('articleTranslation')">中文大意</h2>
                <div class="article-translation collapsed" id="articleTranslation">
                    <!-- 中文大意将通过JavaScript动态生成 -->
                </div>
            </div>
            
            <div class="article-section">
                <h2 class="section-title">语法点</h2>
                <div class="article-grammar" id="articleGrammar">
                    <!-- 语法点将通过JavaScript动态生成 -->
                </div>
            </div>
        </div>
    </div>
    
    <!-- Loading 元素 -->
    <div class="loading-overlay hidden" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">加载中，请稍候...</div>
    </div>
    
    <!-- 家长盖章模态框 -->
    <div class="modal hidden" id="parentStampModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>家长盖章</h3>
                <button class="close-btn" onclick="closeParentStampModal()">&times;</button>
            </div>
            <div class="modal-body">
                <p id="stampMessage"></p>
                <div class="form-group">
                    <label for="stampPassword">请输入密码：</label>
                    <input type="password" id="stampPassword" placeholder="输入密码">
                </div>
            </div>
            <div class="modal-footer">
                <button class="cancel-btn" onclick="closeParentStampModal()">取消</button>
                <button class="confirm-btn" onclick="verifyStampPassword()">确认</button>
            </div>
        </div>
    </div>
    
    <!-- 引入PDF.js库 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script>
        // 备用 CDN 加载
        if (typeof pdfjsLib === 'undefined') {
            document.write('<script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.4.120/build/pdf.min.js"><\/script>');
        }
    </script>
    
    <script type="module" src="../js/main.js"></script>
    <script type="module">
        // 全局变量
        let articles = [];
        let currentArticleIndex = 0;
        let clickedSentences = new Set();
        let totalSentences = 0;
        let currentUser = 'youyou'; // 默认用户
        
        // 初始化文章详情页面
        document.addEventListener('DOMContentLoaded', async function() {
            console.log('[文章详情页面初始化] 开始');
            
            // 检查用户信息
            checkUserInfo();
            
            // 获取URL参数中的文章索引
            const urlParams = new URLSearchParams(window.location.search);
            currentArticleIndex = parseInt(urlParams.get('index')) || 0;
            console.log('[文章详情页面初始化] 当前文章索引:', currentArticleIndex);
            
            // 更新页面标题
            updatePageTitle();
            
            // 检查是否显示家长盖章按钮
            checkStampButton();
            
            // 确保全局变量已初始化
            if (typeof window.currentFile === 'undefined') {
                console.log('[文章详情页面初始化] 等待全局变量初始化...');
                // 等待全局变量初始化
                await new Promise(resolve => {
                    const checkVariables = setInterval(() => {
                        if (typeof window.currentFile !== 'undefined') {
                            clearInterval(checkVariables);
                            resolve();
                        }
                    }, 100);
                });
            }
            
            console.log('[文章详情页面初始化] 全局变量已初始化:', { currentFile: window.currentFile, currentBookName: window.currentBookName });
            
            // 加载文章数据
            await loadArticles();
            
            console.log('[文章详情页面初始化] 结束');
        });
        
        // 更新页面标题
        function updatePageTitle() {
            // 获取URL参数中的文件路径
            const urlParams = new URLSearchParams(window.location.search);
            const targetFile = urlParams.get('file');
            
            // 根据文件类型设置页面标题
            const pageTitle = document.querySelector('.page-title');
            const documentTitle = document.querySelector('title');
            
            if (targetFile === 'all-小学.md' || targetFile === 'all-初中.md') {
                // 必背范文
                if (pageTitle) {
                    pageTitle.textContent = '范文详情';
                }
                if (documentTitle) {
                    documentTitle.textContent = '范文详情';
                }
            } else {
                // 趣文阅读
                if (pageTitle) {
                    pageTitle.textContent = '文章详情';
                }
                if (documentTitle) {
                    documentTitle.textContent = '文章阅读';
                }
            }
        }
        
        // 加载文章数据
        async function loadArticles() {
            console.log('[加载文章数据] 开始');
            // 显示加载中
            const loadingOverlay = document.getElementById('loadingOverlay');
            if (loadingOverlay) {
                loadingOverlay.classList.remove('hidden');
            }
            
            try {
                // 获取URL参数中的文件路径
                const urlParams = new URLSearchParams(window.location.search);
                const targetFile = urlParams.get('file');
                
                let mdPath = '';
                
                if (targetFile) {
                    // 如果URL参数中指定了文件，直接加载该文件
                    mdPath = `../../data/${targetFile}`;
                    console.log('[加载文章数据] 从URL参数加载文件:', mdPath);
                } else {
                    // 否则按照原来的逻辑加载当前课本对应的短文文件
                    // 检查currentFile是否存在
                    if (!window.currentFile) {
                        throw new Error('当前课本未设置');
                    }
                    
                    // 首先尝试加载当前课本对应的短文文件
                    mdPath = `../../data/${window.currentFile.replace('.pdf', '短文.md')}`;
                    console.log('[加载文章数据] 尝试加载短文文件路径:', mdPath);
                    console.log('[加载文章数据] 当前currentFile:', window.currentFile);
                    console.log('[加载文章数据] 当前currentBookName:', window.currentBookName);
                }
                
                // 尝试加载MD文件
                let response = await fetch(mdPath);
                console.log('[加载文章数据] MD文件响应状态:', response.status);
                
                if (response.ok) {
                    const content = await response.text();
                    console.log('[加载文章数据] MD文件加载成功，内容长度:', content.length);
                    parseArticles(content);
                } else {
                    console.log('[加载文章数据] 文件不存在，尝试加载3下的短文文件');
                    // 如果指定的文件不存在，加载3下的短文文件
                    mdPath = `../../data/3下短文.md`;
                    console.log('[加载文章数据] 加载3下短文文件路径:', mdPath);
                    
                    response = await fetch(mdPath);
                    console.log('[加载文章数据] 3下短文文件响应状态:', response.status);
                    
                    if (response.ok) {
                        const content = await response.text();
                        console.log('[加载文章数据] 3下短文文件加载成功，内容长度:', content.length);
                        parseArticles(content);
                    } else {
                        throw new Error('3下短文文件也不存在或无法加载');
                    }
                }
            } catch (error) {
                console.error('加载文章失败:', error);
                // 显示错误信息
                document.getElementById('articleBody').innerHTML = `<div style="text-align: center; padding: 40px; color: #666;">${error.message || '文章加载失败'}</div>`;
            } finally {
                // 隐藏加载中
                const loadingOverlay = document.getElementById('loadingOverlay');
                if (loadingOverlay) {
                    loadingOverlay.classList.add('hidden');
                }
                console.log('[加载文章数据] 结束');
            }
        }
        
        // 解析文章数据
        function parseArticles(content) {
            articles = [];
            const lines = content.split('\n');
            let currentArticle = null;
            
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                
                if (line.startsWith('## ')) {
                    // 新文章开始
                    if (currentArticle) {
                        articles.push(currentArticle);
                    }
                    
                    const chineseTitle = line.substring(3).trim();
                    currentArticle = {
                        chineseTitle: chineseTitle,
                        title: '',
                        body: '',
                        translation: '',
                        grammar: ''
                    };
                } else if (currentArticle) {
                    if (line.startsWith('**Title: ')) {
                        currentArticle.title = line.substring(9, line.length - 2).trim();
                    } else if (line === '**Body:**') {
                        // 收集正文内容
                        let bodyContent = '';
                        i++;
                        while (i < lines.length && !lines[i].trim().startsWith('**')) {
                            bodyContent += lines[i] + ' ';
                            i++;
                        }
                        i--; // 回退一行，因为循环会自增
                        currentArticle.body = bodyContent.trim();
                    } else if (line === '**中文大意:**') {
                        // 收集中文大意
                        let translationContent = '';
                        i++;
                        while (i < lines.length && !lines[i].trim().startsWith('**')) {
                            translationContent += lines[i] + ' ';
                            i++;
                        }
                        i--; // 回退一行，因为循环会自增
                        currentArticle.translation = translationContent.trim();
                    } else if (line === '**语法点:**') {
                        // 收集语法点
                        let grammarContent = '';
                        i++;
                        while (i < lines.length && !lines[i].trim().startsWith('## ')) {
                            if (lines[i].trim()) {
                                grammarContent += lines[i].trim() + ' ';
                            }
                            i++;
                        }
                        i--; // 回退一行，因为循环会自增
                        currentArticle.grammar = grammarContent.trim();
                    }
                }
            }
            
            // 添加最后一篇文章
            if (currentArticle) {
                articles.push(currentArticle);
            }
            
            console.log('[解析文章数据] 解析完成，文章数量:', articles.length);
            
            // 显示当前文章
            if (currentArticleIndex < articles.length) {
                displayArticle(articles[currentArticleIndex]);
            } else {
                document.getElementById('articleBody').innerHTML = '<div style="text-align: center; padding: 40px; color: #666;">文章不存在</div>';
            }
        }
        
        // 显示文章
        function displayArticle(article) {
            // 重置已点击句子集合和总句子数
            clickedSentences.clear();
            totalSentences = 0;
            
            // 更新标题
            document.getElementById('articleTitle').textContent = article.title;
            document.getElementById('articleChineseTitle').textContent = article.chineseTitle;
            
            // 更新英文原文，按段落分割并添加点击事件
            const bodyElement = document.getElementById('articleBody');
            // 按换行符分割段落
            const paragraphs = article.body.split('\n').filter(p => p.trim());
            
            bodyElement.innerHTML = paragraphs.map(paragraph => {
                // 对每个段落，按句子分割
                const sentences = paragraph.split('. ').filter(s => s.trim());
                totalSentences += sentences.length;
                return `<div class="paragraph">${sentences.map((sentence, index) => {
                    // 确保句子以句号结尾
                    const completeSentence = sentence + (sentence.endsWith('.') ? '' : '.');
                    const sentenceId = `${currentArticleIndex}-${index}`;
                    // 转义单引号，避免HTML语法错误
                    const escapedSentence = completeSentence.replace(/'/g, "\\'");
                    return `<span class="sentence" data-sentence-id="${sentenceId}" onclick="selectSentence(this, '${escapedSentence}', '${sentenceId}')">${completeSentence}</span>`;
                }).join(' ')}</div>`;
            }).join('');
            
            // 更新中文大意
            document.getElementById('articleTranslation').textContent = article.translation;
            
            // 更新语法点
            const grammarElement = document.getElementById('articleGrammar');
            if (article.grammar) {
                const grammarPoints = article.grammar.split(' - ').filter(g => g.trim());
                grammarElement.innerHTML = '<ul>' + grammarPoints.map(point => `<li>${point}</li>`).join('') + '</ul>';
            } else {
                grammarElement.textContent = '暂无语法点';
            }
        }
        
        // 选择句子并播放发音
        function selectSentence(element, sentence, sentenceId) {
            // 移除所有句子的选中状态
            document.querySelectorAll('.sentence').forEach(s => s.classList.remove('selected'));
            
            // 添加当前句子的选中状态
            element.classList.add('selected');
            
            // 标记句子为已点击
            clickedSentences.add(sentenceId);
            console.log('[点击句子]', sentenceId, '已点击句子数:', clickedSentences.size, '总句子数:', totalSentences);
            
            // 检查是否点击了所有句子
            if (clickedSentences.size === totalSentences && totalSentences > 0) {
                console.log('[文章点读完成] 所有句子都已点击');
                // 延迟5秒后弹出积分奖励弹窗
                setTimeout(() => {
                    // 给用户增加5个积分
                    if (typeof DataManager !== 'undefined' && typeof currentUser !== 'undefined') {
                        DataManager.addPoints(currentUser, 5, '完成文章点读');
                        alert('恭喜你完成了文章的所有句子点读！获得5积分奖励。');
                    } else {
                        console.error('DataManager 或 currentUser 未定义');
                        alert('恭喜你完成了文章的所有句子点读！');
                    }
                }, 5000);
            }
            
            // 播放句子发音
            console.log('[播放句子发音]', sentence);
            if (typeof AudioManager !== 'undefined') {
                AudioManager.playWordAudio(sentence, false);
            } else {
                console.error('AudioManager 未定义');
            }
        }
        
        // 返回文章列表页面
        function backToArticleList() {
            // 获取URL参数中的file参数
            const urlParams = new URLSearchParams(window.location.search);
            const targetFile = urlParams.get('file');
            
            // 构建返回URL，包含file参数
            let url = 'article-list.html';
            if (targetFile) {
                url += `?file=${encodeURIComponent(targetFile)}`;
            }
            
            window.location.href = url;
        }
        
        // 检查用户信息
        function checkUserInfo() {
            const savedUser = localStorage.getItem('currentUser');
            if (savedUser) {
                currentUser = savedUser;
                console.log('[检查用户信息] 加载保存的用户:', currentUser);
            }
        }
        
        // 切换折叠状态
        function toggleCollapse(elementId) {
            const element = document.getElementById(elementId);
            if (element) {
                element.classList.toggle('collapsed');
                // 切换标题的展开状态
                const title = element.previousElementSibling;
                if (title) {
                    title.classList.toggle('expanded');
                }
            }
        }
        
        // 家长盖章相关函数
        function showParentStampModal() {
            // 获取当前用户名称
            const userName = window.currentUserName || '小朋友';
            
            // 获取当前文章的中文标题
            const chineseTitle = document.getElementById('articleChineseTitle').textContent;
            
            // 提取序号
            const serialNumber = extractSerialNumber(chineseTitle);
            
            // 更新提示信息
            const messageElement = document.getElementById('stampMessage');
            messageElement.textContent = `家长确认${userName}已经完成该必备文章的背诵，确认给${userName}添加5个积分。`;
            
            // 显示模态框
            document.getElementById('parentStampModal').classList.remove('hidden');
        }
        
        function closeParentStampModal() {
            // 关闭模态框
            document.getElementById('parentStampModal').classList.add('hidden');
            // 清空密码输入框
            document.getElementById('stampPassword').value = '';
        }
        
        function verifyStampPassword() {
            // 获取输入的密码
            const password = document.getElementById('stampPassword').value;
            
            // 验证密码
            if (password === 'love') {
                // 密码正确，添加积分
                addStampPoints();
                // 关闭模态框
                closeParentStampModal();
            } else {
                // 密码错误
                alert('密码错误，请重新输入');
            }
        }
        
        function addStampPoints() {
            // 获取当前用户
            const user = currentUser;
            
            // 获取当前文章的中文标题
            const chineseTitle = document.getElementById('articleChineseTitle').textContent;
            
            // 提取序号
            const serialNumber = extractSerialNumber(chineseTitle);
            
            // 添加积分
            if (typeof DataManager !== 'undefined' && user) {
                DataManager.addPoints(user, 5, `背诵必背范文-${serialNumber}`);
                alert('盖章成功！已为小朋友添加5个积分。');
            } else {
                console.error('DataManager 或用户未定义');
                alert('盖章成功！');
            }
        }
        
        function extractSerialNumber(title) {
            // 从标题中提取数字序号
            const match = title.match(/^(\d+)/);
            return match ? match[1] : '';
        }
        
        // 检查是否显示家长盖章按钮
        function checkStampButton() {
            // 获取URL参数中的文件路径
            const urlParams = new URLSearchParams(window.location.search);
            const targetFile = urlParams.get('file');
            
            const stampContainer = document.getElementById('parentStampContainer');
            if (stampContainer) {
                if (targetFile === 'all-小学.md' || targetFile === 'all-初中.md') {
                    // 必背范文，显示盖章按钮
                    stampContainer.style.display = 'block';
                } else {
                    // 趣文阅读，隐藏盖章按钮
                    stampContainer.style.display = 'none';
                }
            }
        }
        
        // 暴露函数到全局作用域
        window.selectSentence = selectSentence;
        window.backToArticleList = backToArticleList;
        window.toggleCollapse = toggleCollapse;
        window.showParentStampModal = showParentStampModal;
        window.closeParentStampModal = closeParentStampModal;
        window.verifyStampPassword = verifyStampPassword;
    </script>
</body>
</html>
