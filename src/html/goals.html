<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>学习目标 - 单词学习工具</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        .goals-page {
            padding-top: 60px;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .goals-content {
            padding: 20px;
        }
        
        .goals-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .goals-card h2 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #333;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .goals-card h2 .icon {
            font-size: 20px;
        }
        
        .goal-item {
            margin-bottom: 15px;
        }
        
        .goal-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        
        .goal-label {
            font-size: 14px;
            color: #666;
        }
        
        .goal-progress {
            font-size: 14px;
            font-weight: 600;
            color: #4CAF50;
        }
        
        .progress-bar-container {
            width: 100%;
            height: 12px;
            background-color: #f0f0f0;
            border-radius: 6px;
            overflow: hidden;
        }
        
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #4CAF50, #45a049);
            border-radius: 6px;
            transition: width 0.3s ease;
        }
        
        .milestone-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            background-color: #f9f9f9;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        
        .milestone-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .milestone-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: #e3f2fd;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        
        .milestone-icon.completed {
            background-color: #e8f5e8;
        }
        
        .milestone-text {
            flex: 1;
        }
        
        .milestone-title {
            font-size: 14px;
            font-weight: 600;
            color: #333;
        }
        
        .milestone-reward {
            font-size: 12px;
            color: #666;
        }
        
        .milestone-status {
            font-size: 12px;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 12px;
        }
        
        .milestone-status.pending {
            background-color: #fff3e0;
            color: #ff9800;
        }
        
        .milestone-status.completed {
            background-color: #e8f5e8;
            color: #4CAF50;
        }
        
        .reward-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            z-index: 1000;
            text-align: center;
            max-width: 300px;
        }
        
        .reward-popup h3 {
            margin-top: 0;
            color: #4CAF50;
        }
        
        .reward-popup p {
            margin-bottom: 20px;
        }
        
        .reward-popup button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
        }
        
        .reward-popup button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <!-- 学习目标页面 -->
    <div class="goals-page active" id="goalsPage">
        <div class="list-header">
            <div class="list-header-bar">
                <button class="back-btn" onclick="backToHome()">‹</button>
                <div class="list-title">学习目标</div>
                <div style="width: 36px;"></div>
            </div>
        </div>
        
        <div class="goals-content">
            <!-- 每周学习目标 -->
            <div class="goals-card">
                <h2><span class="icon">📅</span> 每周学习目标</h2>
                <div class="goal-item">
                    <div class="goal-info">
                        <span class="goal-label">本周目标</span>
                        <span class="goal-progress" id="weeklyProgress">0/100</span>
                    </div>
                    <div class="progress-bar-container">
                        <div class="progress-bar" id="weeklyProgressBar" style="width: 0%"></div>
                    </div>
                </div>
                <div class="goal-info" style="margin-top: 10px;">
                    <span class="goal-label">本周开始日期</span>
                    <span id="weekStartDate"></span>
                </div>
            </div>
            
            <!-- 每月学习目标 -->
            <div class="goals-card">
                <h2><span class="icon">📆</span> 每月学习目标</h2>
                <div class="goal-item">
                    <div class="goal-info">
                        <span class="goal-label">本月目标</span>
                        <span class="goal-progress" id="monthlyProgress">0/400</span>
                    </div>
                    <div class="progress-bar-container">
                        <div class="progress-bar" id="monthlyProgressBar" style="width: 0%"></div>
                    </div>
                </div>
                <div class="goal-info" style="margin-top: 10px;">
                    <span class="goal-label">本月开始日期</span>
                    <span id="monthStartDate"></span>
                </div>
            </div>
            
            <!-- 学习里程碑 -->
            <div class="goals-card">
                <h2><span class="icon">🏆</span> 学习里程碑</h2>
                <div id="milestonesContainer">
                    <!-- 里程碑项目将通过 JavaScript 动态生成 -->
                </div>
            </div>
        </div>
    </div>
    
    <!-- Loading 元素 -->
    <div class="loading-overlay hidden" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">加载中，请稍候...</div>
    </div>
    
    <!-- 奖励弹窗 -->
    <div class="reward-popup hidden" id="rewardPopup">
        <h3>🎉 恭喜你！</h3>
        <p id="rewardMessage"></p>
        <button onclick="closeRewardPopup()">确定</button>
    </div>
    
    <!-- 引入PDF.js库 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script>
        // 备用 CDN 加载
        if (typeof pdfjsLib === 'undefined') {
            document.write('<script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.4.120/build/pdf.min.js"><\/script>');
        }
    </script>
    
    <script type="module" src="../js/main.js"></script>
    <script>
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            console.log('学习目标页面加载完成');
            
            // 等待 DataManager 加载
            if (typeof DataManager !== 'undefined') {
                loadGoals();
            } else {
                // 如果 DataManager 未加载，等待一段时间后重试
                setTimeout(loadGoals, 1000);
            }
        });
        
        // 加载学习目标数据
        function loadGoals() {
            try {
                const user = window.currentUser || 'youyou';
                console.log('加载学习目标数据 - 用户:', user);
                
                if (typeof DataManager !== 'undefined') {
                    const userData = DataManager.getUserData(user);
                    console.log('用户数据:', userData);
                    
                    if (userData && userData.goals) {
                        // 更新每周目标
                        const weeklyGoal = userData.goals.weekly;
                        if (weeklyGoal) {
                            document.getElementById('weeklyProgress').textContent = `${weeklyGoal.current}/${weeklyGoal.target}`;
                            const weeklyProgressPercent = Math.min((weeklyGoal.current / weeklyGoal.target) * 100, 100);
                            document.getElementById('weeklyProgressBar').style.width = `${weeklyProgressPercent}%`;
                            document.getElementById('weekStartDate').textContent = weeklyGoal.weekStart;
                        }
                        
                        // 更新每月目标
                        const monthlyGoal = userData.goals.monthly;
                        if (monthlyGoal) {
                            document.getElementById('monthlyProgress').textContent = `${monthlyGoal.current}/${monthlyGoal.target}`;
                            const monthlyProgressPercent = Math.min((monthlyGoal.current / monthlyGoal.target) * 100, 100);
                            document.getElementById('monthlyProgressBar').style.width = `${monthlyProgressPercent}%`;
                            document.getElementById('monthStartDate').textContent = monthlyGoal.monthStart;
                        }
                        
                        // 更新里程碑
                        const milestones = userData.goals.milestones;
                        if (milestones && Array.isArray(milestones)) {
                            const milestonesContainer = document.getElementById('milestonesContainer');
                            milestonesContainer.innerHTML = '';
                            
                            milestones.forEach(milestone => {
                                const milestoneItem = document.createElement('div');
                                milestoneItem.className = 'milestone-item';
                                
                                const iconClass = milestone.completed ? 'milestone-icon completed' : 'milestone-icon';
                                const icon = milestone.completed ? '✅' : '📚';
                                
                                const statusClass = milestone.completed ? 'milestone-status completed' : 'milestone-status pending';
                                const statusText = milestone.completed ? '已完成' : '进行中';
                                
                                let rewardText = '';
                                switch (milestone.target) {
                                    case 100:
                                        rewardText = '奖励 10 积分';
                                        break;
                                    case 500:
                                        rewardText = '奖励 20 积分';
                                        break;
                                    case 1000:
                                        rewardText = '奖励 50 积分';
                                        break;
                                    case 5000:
                                        rewardText = '奖励 100 积分';
                                        break;
                                    case 10000:
                                        rewardText = '奖励 200 积分';
                                        break;
                                }
                                
                                milestoneItem.innerHTML = `
                                    <div class="milestone-info">
                                        <div class="${iconClass}">${icon}</div>
                                        <div class="milestone-text">
                                            <div class="milestone-title">累计学习 ${milestone.target} 个单词</div>
                                            <div class="milestone-reward">${rewardText}</div>
                                        </div>
                                    </div>
                                    <div class="${statusClass}">${statusText}</div>
                                `;
                                
                                milestonesContainer.appendChild(milestoneItem);
                            });
                        }
                    }
                } else {
                    console.error('DataManager 未加载');
                }
            } catch (error) {
                console.error('加载学习目标数据失败:', error);
            }
        }
        
        // 关闭奖励弹窗
        function closeRewardPopup() {
            document.getElementById('rewardPopup').classList.add('hidden');
        }
        
        // 返回首页
        function backToHome() {
            window.location.href = 'index.html';
        }
        
        // 定期更新目标数据
        setInterval(loadGoals, 30000); // 每30秒更新一次
    </script>
</body>
</html>
