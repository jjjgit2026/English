# 工作流名称：Build and Deploy Full Project
name: Build and Deploy Full Project

# 触发条件：当代码推送到 main 分支时
on:
  push:
    branches: [ main ]

# 定义作业
jobs:
  # 作业名称：build
  build:
    # 运行环境：最新版 Ubuntu
    runs-on: ubuntu-latest
    
    # 权限设置：授予写入内容的权限
    permissions:
      contents: write
    
    # 步骤列表
    steps:
      # 步骤 1：检出代码
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整历史记录
      
      # 步骤 2：设置 Node.js 环境
      - uses: actions/setup-node@v4
        with:
          # Node.js 版本：18（14 版本较旧，建议升级）
          node-version: '18'
          # 缓存 npm 依赖
          cache: 'npm'
      
      # 步骤 3：安装依赖
      - name: Install dependencies
        run: npm ci  # 使用 ci 而不是 install，确保版本一致性
      
      # 步骤 4：构建项目，生成 dist 文件夹
      - name: Build project
        run: npm run build
      
      # ✅ 新增步骤：验证构建输出
      - name: Verify build output
        run: |
          echo "=== 验证构建结果 ==="
          if [ -d "dist" ]; then
            echo "✅ dist 文件夹创建成功"
            echo "dist 内容:"
            ls -la dist/
            echo ""
            echo "文件数量: $(find dist -type f | wc -l)"
          else
            echo "❌ 错误: 构建后未找到 dist 文件夹"
            echo "当前目录结构:"
            ls -la
            exit 1
          fi
      
      # ✅ 新增步骤：显示将要部署的文件
      - name: List files for deployment
        run: |
          echo "=== 将要部署的文件结构 ==="
          find . -maxdepth 2 -type f -name "*.html" -o -name "*.js" -o -name "*.css" | head -20
          echo ""
          echo "目录结构:"
          find . -maxdepth 2 -type d | sort
      
      # 步骤 5：部署整个项目到 GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          # GitHub token：用于授权部署
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # 部署目录：项目根目录，包含 src 和 dist
          publish_dir: ./  # 部署整个项目根目录
          # 部署分支
          publish_branch: gh-pages
          # 强制创建孤儿分支：每次部署创建新的 gh-pages 分支
          force_orphan: true
          # 用户信息（可选）
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          # 提交信息
          commit_message: 'Deploy: ${{ github.event.head_commit.message }}'
          # 排除不需要部署的文件/文件夹
          exclude_paths: |
            .github/
            .gitignore
            node_modules/
            *.log
            *.tmp
      
      # ✅ 新增步骤：部署完成通知
      - name: Deployment completed
        run: |
          echo "✅ 部署完成！"
          echo "网站地址: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          echo "dist 目录: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/dist/"
          echo "src 目录: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/src/"